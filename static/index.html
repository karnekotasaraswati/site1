<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stazzy | Starzopp Assistant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #2e1065);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .chat-container {
            width: 90%;
            max-width: 850px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15), 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle glowing top border */
        .chat-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.8), transparent);
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-links {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 8px 14px;
            font-size: 0.8rem;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: var(--primary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--text-muted) transparent;
        }

        #chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background-color: var(--text-muted);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .ai-message {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .input-area {
            padding: 24px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            background: rgba(15, 23, 42, 0.3);
        }

        input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 20px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 28px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            height: 24px;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; background-color: var(--primary); }
        }

        .settings-bar {
            padding: 8px 24px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .feedback-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message-wrapper:hover .feedback-container {
            opacity: 1;
        }

        .feedback-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .feedback-btn.active {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .meta-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .accuracy-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .feedback-input-container {
            margin-top: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            background: rgba(0, 0, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
            border-left: 2px solid var(--primary);
        }

        .feedback-input {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 8px;
            color: var(--text-main);
            font-size: 0.85rem;
        }

        /* Lock Screen Styles */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lock-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.7);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .lock-icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), #c084fc);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
        }

        .lock-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .lock-card p {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .login-form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .login-form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .login-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: white;
            font-family: monospace;
            transition: all 0.2s;
        }

        .login-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            margin-top: 12px;
        }

        #login-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <!-- Security Gatekeeper -->
    <div id="lock-screen">
        <div class="lock-card">
            <div class="lock-icon-container">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2>Stazzy Secure</h2>
            <p>Please enter your API credentials to continue</p>

            <div class="login-form-group">
                <label>API Key</label>
                <input type="text" id="login-key" class="login-input" placeholder="sk_...">
            </div>

            <div class="login-form-group">
                <label>Secret Key</label>
                <input type="password" id="login-secret" class="login-input" placeholder="ss_...">
            </div>

            <button class="login-btn" onclick="authenticate()" id="auth-btn">
                Unlock Assistant
            </button>

            <div id="login-error">Invalid credentials. Please try again.</div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title-group">
                <div class="status-dot"></div>
                <h1>Starzopp Assistant</h1>
            </div>
            <div class="header-links">
                <a href="/keys" class="header-btn">Manage Keys</a>
                <button onclick="logout()" class="header-btn" style="color: #ef4444;">Logout</button>
            </div>
        </div>

        <div id="chat-messages">
            <div class="message ai-message">
                Hello! I am stazzy, your StarZopp Assistant. How can I help you today?
            </div>
        </div>


        <div id="typing-indicator" class="typing" style="margin-left: 24px;">
            AI is thinking <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <div class="input-area">
            <input type="text" id="msg" placeholder="Type your message..." autocomplete="off">
            <button id="send-btn" onclick="send()">
                Send &nbsp; <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>

        <div class="settings-bar">
            <span>Model: Qwen1.5-0.5B</span>
            <span id="api-status">Endpoint: /generate</span>
        </div>
    </div>

    <script>
        const msgInput = document.getElementById("msg");
        const chatMessages = document.getElementById("chat-messages");
        const typingIndicator = document.getElementById("typing-indicator");
        const sendBtn = document.getElementById("send-btn");
        const apiStatus = document.getElementById("api-status");

        // Dynamic API Key and Secret handling
        const urlParams = new URLSearchParams(window.location.search);
        let currentApiKey = urlParams.get('key') || localStorage.getItem('activeChatKey') || "";
        let currentApiSecret = urlParams.get('secret') || localStorage.getItem('activeChatSecret') || "";

        // Authentication Logic
        function logout() {
            localStorage.removeItem('activeChatKey');
            localStorage.removeItem('activeChatSecret');
            location.reload();
        }

        async function authenticate() {
            const key = document.getElementById('login-key').value.trim();
            const secret = document.getElementById('login-secret').value.trim();
            const btn = document.getElementById('auth-btn');
            const error = document.getElementById('login-error');

            if (!key) {
                error.textContent = "Please provide an API Key.";
                error.style.display = "block";
                return;
            }


            btn.disabled = true;
            btn.textContent = "Verifying...";
            error.style.display = "none";

            try {
                const res = await fetch("/verify-token", {
                    headers: { "X-API-Key": key, "X-API-Secret": secret }
                });

                if (res.ok) {
                    localStorage.setItem('activeChatKey', key);
                    localStorage.setItem('activeChatSecret', secret);
                    currentApiKey = key;
                    currentApiSecret = secret;

                    // Update UI status
                    apiStatus.innerHTML = `Key: <span style="color: #818cf8;">${currentApiKey}</span> | Secret: <span style="color: #c084fc;">${currentApiSecret}</span>`;

                    // Fade out lock screen
                    document.getElementById('lock-screen').style.transition = "opacity 0.5s ease";
                    document.getElementById('lock-screen').style.opacity = "0";
                    setTimeout(() => {
                        document.getElementById('lock-screen').style.display = "none";
                    }, 500);
                } else {
                    error.textContent = "Access Denied: Invalid Key or Secret.";
                    error.style.display = "block";
                }
            } catch (err) {
                error.textContent = "Connection error. Is the server running?";
                error.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Unlock Assistant";
            }
        }

        const sessionId = (function createSessionId() {
            let id = localStorage.getItem("chat_session_id");
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'sess-' + Date.now();
                localStorage.setItem("chat_session_id", id);
            }
            return id;
        })();

        // Skip Lock Screen for Pre-Login Mode
        window.addEventListener('load', async () => {
            document.getElementById('lock-screen').style.display = "none";
            apiStatus.innerHTML = `<span style="color: #10b981;">Session: ${sessionId.substring(0,8)}...</span>`;
        });

        msgInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });

        async function send() {
            const prompt = msgInput.value.trim();
            if (!prompt) return;

            addMessage(prompt, 'user');
            msgInput.value = "";

            // Send to AI for full variety



            // Call Backend AI
            typingIndicator.style.display = "block";
            sendBtn.disabled = true;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ session_id: sessionId, question: prompt })
                });

                if (!response.ok) {
                    let errorDetail = "Server error";
                    try { const d = await response.json(); errorDetail = d.detail || errorDetail; } catch(e) {}
                    throw new Error(`[${response.status}] ${errorDetail}`);
                }

                typingIndicator.style.display = "none";
                const data = await response.json();
                
                const wrapper = addMessage(data.response, 'ai', data.metadata, true);

            } catch (err) {
                typingIndicator.style.display = "none";
                addMessage("⚠️ " + err.message + " — Please try again.", 'ai');
                console.error("Chat error:", err);
            } finally {
                sendBtn.disabled = false;
                msgInput.focus();
            }
        }



        function addMessage(text, sender, metadata = null, returnWrapper = false) {
            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper";
            if (sender === 'user') wrapper.style.alignSelf = "flex-end";
            else wrapper.style.alignSelf = "flex-start";
            wrapper.style.display = "flex";
            wrapper.style.flexDirection = "column";
            wrapper.style.maxWidth = "80%";

            const div = document.createElement("div");
            div.className = `message ${sender}-message`;
            div.style.maxWidth = "100%";
            div.innerText = text;

            wrapper.appendChild(div);

            if (metadata) {
                const meta = document.createElement("div");
                meta.className = "meta-text";
                meta.innerHTML = `
                    <span>${metadata.duration_seconds}s | ${metadata.model} Generator</span>
                `;
                wrapper.appendChild(meta);
            }

            if (sender === 'ai' && text) {
                const feedback = document.createElement("div");
                feedback.className = "feedback-container";
                feedback.innerHTML = `
                    <button class="feedback-btn" onclick="handleFeedback(this, 'up', '${text.replace(/'/g, "\\'")}')">👍</button>
                    <button class="feedback-btn" onclick="handleFeedback(this, 'down', '${text.replace(/'/g, "\\'")}')">👎</button>
                `;
                wrapper.appendChild(feedback);
            }

            chatMessages.appendChild(wrapper);

            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;

            if (returnWrapper) return wrapper;
        }


        async function handleFeedback(btn, type, responseText) {
            const container = btn.parentElement;
            const buttons = container.querySelectorAll('.feedback-btn');

            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const wrapper = container.parentElement;
            const inputContainer = wrapper.querySelector('.feedback-input-container');

            if (type === 'down') {
                inputContainer.style.display = "flex";
            } else {
                inputContainer.style.display = "none";
                sendFeedbackToServer('positive', responseText, "");
            }
        }

        async function submitImprovement(btn, responseText) {
            const container = btn.parentElement;
            const comment = container.querySelector('.feedback-input').value;

            if (!comment) return alert("Please provide the correct answer so I can learn!");

            await sendFeedbackToServer('negative', responseText, comment);

            container.innerHTML = "<p style='color: #10b981; font-size: 0.8rem;'>Thank you! I will use this to improve my answers.</p>";
            setTimeout(() => {
                container.style.display = "none";
            }, 3000);
        }

        async function sendFeedbackToServer(type, responseText, comment) {
            let promptText = "Unknown prompt";
            const wrappers = document.querySelectorAll('.message-wrapper');
            // Logic to find the prompt associated with this AI response
            for (let i = 0; i < wrappers.length; i++) {
                if (wrappers[i].contains(event.target)) {
                    if (i > 0) {
                        const prevWrapper = wrappers[i - 1];
                        const userMsg = prevWrapper.querySelector('.user-message');
                        if (userMsg) promptText = userMsg.innerText;
                    }
                    break;
                }
            }

            try {
                await fetch("/feedback", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        question: promptText,
                        answer: responseText,
                        feedback: type
                    })
                });
            } catch (err) {
                console.error("Failed to send feedback", err);
            }
        }
    </script>
</body>

</html>
